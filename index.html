<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='black'/%3E%3Crect x='4' y='4' width='24' height='24' fill='none' stroke='white' stroke-width='2'/%3E%3Ctext x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='900' font-size='18'%3EC%3C/text%3E%3C/svg%3E">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Roboto:wght@400;700&family=Poppins:wght@400;600&family=Merriweather:wght@400;700&family=Oswald:wght@400;700&family=Lato:wght@400;700&family=Nunito:wght@400;700&family=Raleway:wght@400;700&family=Open+Sans:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&family=Ubuntu:wght@400;700&family=Josefin+Sans:wght@400;700&family=Titillium+Web:wght@400;700&family=Outfit:wght@400;700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@400;700&family=Caveat:wght@400;700&family=Cinzel:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="h-screen flex flex-col">

    <div id="initialLoader">
        <div class="logo-box"><span class="logo-char">C</span></div>
        <div class="loader-text">CERT.AUTO</div>
        <div class="absolute bottom-12 flex flex-col items-center opacity-40">
            <span class="text-[7px] font-medium lowercase italic mb-1">developed by:</span>
            <span class="text-[9px] font-black uppercase tracking-[0.4em]">AARON POE SEREÑA</span>
        </div>
    </div>



    <header class="h-14 border-b flex items-center justify-between px-6 z-10 shadow-sm">
        <div class="flex items-center space-x-6">
            <h1 class="text-sm font-black uppercase tracking-tight">CERT.AUTO</h1>
            <div class="toolbar-group">
                <select id="fontFamily" class="toolbar-select w-40">
                    <option value="Inter">Inter (Default)</option>
                    <option value="Outfit">Outfit</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Poppins">Poppins</option>
                    <option value="Roboto">Roboto</option>
                    <option value="Open Sans">Open Sans</option>
                    <option value="Lato">Lato</option>
                    <option value="Nunito">Nunito</option>
                    <option value="Raleway">Raleway</option>
                    <option value="Ubuntu">Ubuntu</option>
                    <option value="Playfair Display">Playfair Display</option>
                    <option value="Merriweather">Merriweather</option>
                    <option value="Lora">Lora</option>
                    <option value="Libre Baskerville">Libre Baskerville</option>
                    <option value="Oswald">Oswald</option>
                    <option value="Josefin Sans">Josefin Sans</option>
                    <option value="Titillium Web">Titillium Web</option>
                    <option value="Cinzel">Cinzel</option>
                    <option value="Dancing Script">Dancing Script</option>
                    <option value="Caveat">Caveat</option>
                    <option value="serif">System Serif</option>
                    <option value="sans-serif">System Sans</option>
                    <option value="monospace">Monospace</option>
                </select>
                <input type="number" id="fontSize" value="30" class="toolbar-input w-16">
                <button id="toggleBold" class="toggle-btn">B</button>
                <button id="toggleItalic" class="toggle-btn italic">I</button>
                <select id="textAlign" class="toolbar-select">
                    <option value="left">Left</option>
                    <option value="center">Center</option>
                    <option value="right">Right</option>
                </select>
                <input type="color" id="textColor" class="w-8 h-8 border-none bg-transparent cursor-pointer">
            </div>

            <div class="toolbar-group">
                <button id="btnZoomOut" class="toggle-btn text-lg">−</button>
                <span id="zoomDisplay" class="text-[10px] font-black w-8 text-center">100%</span>
                <button id="btnZoomIn" class="toggle-btn text-lg">+</button>
            </div>
            <label class="toggle-switch ml-4">
                <input type="checkbox" id="themeCheckbox" class="checkbox">
                <span class="switch-label"></span>
            </label>
        </div>
        <span id="nameCountDisplay" class="text-[10px] text-gray-400 font-bold uppercase">0 NAMES READY</span>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-72 border-r flex flex-col p-6 space-y-6">
            <div id="sidebarEditor" class="space-y-6 overflow-y-auto flex-1">
                <section>
                    <label class="text-[10px] font-bold uppercase text-gray-400 block mb-3">Layout Setup</label>
                    <div class="space-y-3">
                        <input type="file" id="layoutUpload" accept="image/*" class="hidden">
                        <button onclick="document.getElementById('layoutUpload').click()" class="btn-ui-layout-setup">
                            <span>+</span>
                            <span>Upload Template</span>
                        </button>
                        <button id="addPlaceholder" class="btn-ui-outline">Add Text Box</button>

                    </div>
                </section>
                <section>
                    <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2">Batch Names</label>
                    <textarea id="nameList" rows="5"
                        class="w-full border border-gray-200 p-3 text-sm focus:ring-1 focus:ring-black outline-none rounded-lg"
                        placeholder="One name per line..."></textarea>
                </section>
                <div class="px-2 pb-8 mt-6">
                    <button id="btnStartProcess" class="btn-ui-black tracking-[0.2em]">Generate Batch</button>
                </div>
            </div>

            <div id="sidebarExport" class="hidden space-y-4 flex-1">
                <label class="text-[10px] font-bold uppercase text-gray-400 block mb-2">Export Options</label>
                <div class="relative">
                    <button id="btnDropdownToggle" class="btn-ui-outline justify-between px-4">Download
                        <span>▼</span></button>
                    <div id="dropdownContent" class="dropdown-content">
                        <button onclick="exportBatch('pdf')" class="dropdown-item">Download as PDF</button>
                        <button onclick="exportBatch('png')" class="dropdown-item">Download as PNG</button>
                    </div>
                </div>
                <button id="btnBackToEditor" class="w-full text-xs text-gray-400 uppercase font-bold py-2">← Back to
                    Editor</button>
            </div>
        </aside>

        <main id="mainViewport"
            class="flex-1 canvas-container relative flex items-start justify-center p-12 overflow-auto">
            <div id="zoom-container" class="origin-top transition-transform duration-200 ease-out">
                <div id="canvas-wrapper" class="relative min-w-[300px] min-h-[200px]">
                    <img id="layoutImage" src=""
                        class="absolute inset-0 w-full h-full object-fill pointer-events-none hidden">
                    <div id="editor-layer" class="absolute inset-0 z-10"></div>
                    <div id="emptyState" class="absolute inset-0 flex items-center justify-center opacity-40">
                        <div class="text-[10px] font-black uppercase tracking-[0.3em] flex items-center gap-3">
                            <div class="w-1.5 h-1.5 rounded-full bg-current animate-pulse"></div>
                            Upload template to begin
                        </div>
                    </div>
                </div>
            </div>
            <div id="results-container" class="hidden flex flex-col items-center w-full">
                <div class="text-center mb-8">
                    <h2 class="text-xl font-black uppercase tracking-widest">Review Outputs</h2>
                    <p class="text-xs text-gray-500 uppercase font-bold">Scroll down to see all generated certificates
                    </p>
                </div>
            </div>
        </main>
    </div>

    <div id="export-target"></div>



    <div id="exportOverlay" class="fixed inset-0 bg-white/95 hidden items-center justify-center z-50 backdrop-blur-md">
        <div class="flex flex-col items-center">
            <div class="spinner mb-6">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div id="progressText" class="text-[10px] font-black text-black mb-1">0%</div>
            <h3 class="font-black uppercase text-[10px] tracking-widest text-gray-400">Processing Batch</h3>
        </div>
        <div class="absolute bottom-12 flex flex-col items-center text-black opacity-30">
            <span class="text-[7px] font-medium lowercase italic mb-1">developed by:</span>
            <span class="text-[9px] font-black uppercase tracking-[0.4em]">AARON POE SEREÑA</span>
        </div>
    </div>

    <div class="fixed bottom-8 left-8 z-[60] opacity-30 pointer-events-none select-none">
        <div class="flex flex-col">
            <span class="text-[7px] font-medium lowercase italic mb-1">developed by:</span>
            <span class="text-[9px] font-black uppercase tracking-[0.5em]">AARON POE SEREÑA</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
